name: Refresh Garmin Data

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # allow manual run from the Actions tab

permissions:
  contents: write           # needed to push garmin_data.json back to main

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install garminconnect
        run: pip install garminconnect

      - name: Fetch Garmin data
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: python garmin_fetch.py

      - name: Commit updated garmin_data.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh garmin data'
          file_pattern: garmin_data.json
